# LAYOUT SWITCHING - Toggle between hy3 and scroll
bind = SUPER, L, exec, /home/stubbe/.stubbe/src/hypr/scripts/toggle.layout.sh

# LAUNCHERS
bind = SUPER, RETURN, exec, alacritty
bind = SUPER_SHIFT, e, exec, nautilus || thunar || dolphin
bind = SUPER, SPACE, exec, rofi -drun-reload-desktop-cache -drun-use-desktop-cache -show drun
bind = SUPER_SHIFT, SPACE, exec, rofi -show combi -combi-modes "run" -modes combi
bind = SUPER_CTRL, SPACE, exec, rofi -show combi -combi-modes "window" -modes combi
bind = SHIFT, Print, exec, pgrep -x hyprshot >/dev/null || hyprshot -m active -m output --clipboard-only
bind = , Print, exec, pgrep -x hyprshot >/dev/null || hyprshot -m region --clipboard-only
bind = SUPER, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy && wtype -M ctrl v && notify-send "Pasted selection"
bind = SUPER, C, exec, wl-copy "$(wl-paste -p)" && notify-send "Copied selection"
bind = SUPER, M, exec, open-mail

# GENERAL
bind = SUPER_SHIFT, Q, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.killactive.sh
bind = SUPER, F, fullscreen
bind = SUPER, T, togglefloating,
bind = SUPER, escape, exec, hyprlock
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
bind = SUPER, delete, exit

# WINDOW MOVEMENT (works in both hy3 and scroll layouts)
bind = SUPER, left, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.movefocus.sh l
bind = SUPER, right, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.movefocus.sh r
bind = SUPER, up, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.movefocus.sh u
bind = SUPER, down, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.movefocus.sh d

bind = SUPER_SHIFT, left, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.movewindow.sh l
bind = SUPER_SHIFT, right, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.movewindow.sh r
bind = SUPER_SHIFT, up, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.movewindow.sh u
bind = SUPER_SHIFT, down, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.movewindow.sh d

bind = SUPER_CTRL, left, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.resizeactive.sh -50 0
bind = SUPER_CTRL, right, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.resizeactive.sh 50 0
bind = SUPER_CTRL, up, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.resizeactive.sh 0 -50
bind = SUPER_CTRL, down, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.resizeactive.sh 0 50

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Focus cycling (works in both layouts)
bind = SUPER, mouse_down, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.movefocus.sh r
bind = SUPER, mouse_up, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.movefocus.sh l
bind = SUPER, bracketright, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.movefocus.sh r
bind = SUPER, bracketleft, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.movefocus.sh l

# Workspace switching (works in both layouts)
bind = SUPER_SHIFT, mouse_down, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.scrollworkspace.sh next
bind = SUPER_SHIFT, mouse_up, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.scrollworkspace.sh prev
bind = SUPER_SHIFT, bracketright, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.scrollworkspace.sh next
bind = SUPER_SHIFT, bracketleft, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.scrollworkspace.sh prev
bind = SUPER, Tab, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.scrollworkspace.sh next
bind = SUPER_SHIFT, Tab, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.scrollworkspace.sh prev

bind = SUPER_SHIFT, 1, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.movetoworkspace.sh 1
bind = SUPER_SHIFT, 2, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.movetoworkspace.sh 2
bind = SUPER_SHIFT, 3, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.movetoworkspace.sh 3
bind = SUPER_SHIFT, 4, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.movetoworkspace.sh 4
bind = SUPER_SHIFT, 5, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.movetoworkspace.sh 5
bind = SUPER_SHIFT, 6, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.movetoworkspace.sh 6
bind = SUPER_SHIFT, 7, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.movetoworkspace.sh 7
bind = SUPER_SHIFT, 8, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.movetoworkspace.sh 8
bind = SUPER_SHIFT, 9, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.movetoworkspace.sh 9
bind = SUPER_SHIFT, 0, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.movetoworkspace.sh 10

bind = SUPER, R, submap, resize_mode
submap = resize_mode
binde = , right, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.resizeactive.sh 10 0
binde = , left, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.resizeactive.sh -10 0
binde = , up, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.resizeactive.sh 0 -10
binde = , down, exec, /home/stubbe/.stubbe/src/hypr/scripts/wrapper.resizeactive.sh 0 10
bind = , return, submap, reset
bind = , escape, submap, reset
bind = SUPER, R, submap, reset
submap = reset

# MEDIA KEYS
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioStop, exec, playerctl stop
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindl = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, /home/stubbe/git/dotfiles/src/hypr/scripts/audio.control.sh mic-mute

# BRIGHTNESS KEYS
bindl = , XF86MonBrightnessUp, exec, /home/stubbe/.stubbe/src/hypr/scripts/monitor.brightness.sh increase
bindl = , XF86MonBrightnessDown, exec, /home/stubbe/.stubbe/src/hypr/scripts/monitor.brightness.sh decrease

# LID BINDS
bindl = , switch:Lid Switch, exec, /home/stubbe/.stubbe/src/hypr/scripts/monitor.toggle.sh
