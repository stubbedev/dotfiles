# wayle desktop shell config. Catppuccin Mocha; palette mirrors
# modules/home/xdg/hypr.nix:30-57 (manual sync). Full schema: wayle docs under
# docs/config/ in the upstream source, or https://wayle.app/config/.

[general]
# waybar rendered everything in JetBrainsMono Nerd Font; match that for both
# UI text and mono so the bar reads identically.
font-sans = "JetBrainsMono Nerd Font"
font-mono = "JetBrainsMono Nerd Font"

[styling]
# Static palette (no wallpaper-derived theming) so colors stay Catppuccin.
theme-provider = "wayle"
# Rounded dropdowns/popovers/OSD/dialogs (the bar itself stays flat — see
# [bar].rounding/button-rounding = "none").
rounding = "sm"

[styling.palette]
# bg=base, surface=mantle (the waybar bar color), elevated=surface0 (pills).
bg = "#1e1e2e"
surface = "#181825"
elevated = "#313244"
fg = "#cdd6f4"
fg-muted = "#a6adc8"
primary = "#cba6f7"
red = "#f38ba8"
yellow = "#f9e2af"
green = "#a6e3a1"
blue = "#89b4fa"

[bar]
location = "top"
exclusive = true
# Flat bar — no border radius anywhere (bar, buttons, button groups).
rounding = "none"
button-rounding = "none"
button-group-rounding = "none"
# "basic" = icon+label, minimal background (no colored pill per module).
button-variant = "basic"
# Bar flush to the screen edge (padding = padding-ends = 0, no gap bar↔screen),
# but widgets keep their INTERNAL padding — button-label-padding is the margin
# around each button's icon+label, NOT the bar-edge gap. px sizes are ABSOLUTE
# (bypass `scale`; see the Size type in the wayle docs). With bar padding 0 the
# bar height is the tallest button = button-icon-size + 2*button-label-padding =
# 20 + 2*4 = 28. So: 28px bar, widgets flush to the screen edges, 4px breathing
# room inside each widget. `scale` stays 0.75 for HORIZONTAL inter-widget
# spacing only (module-gap, button-gap) — it no longer affects height.
scale = 0.75
button-icon-size = "20px"
button-label-size = "14px"
button-label-padding = "4px"
padding = "0px"
padding-ends = "0px"
module-gap = 0.35
button-border-location = "none"

[[bar.layout]]
monitor = "*"
left = ["hyprland-workspaces", "niri-workspaces", "custom-submap"]
# Clock centered as the focal point; everything else on the right.
center = ["clock"]
# Grouped left-to-right by purpose: activity → audio/hardware → connectivity →
# system → tray → vpn → notifications → power.
right = [
  "custom-mail",
  "custom-treeman",
  "keyboard-input",
  "custom-screenrec",
  "volume",
  "microphone",
  "brightness",
  @BATTERY@
  "network",
  "bluetooth",
  "custom-hyprsunset",
  "custom-powerprofile",
  "systray",
  "custom-vpn",
  "notifications",
  "power",
]

[modules.clock]
# waybar showed an ISO-ish date + 24h time.
format = "%Y-%m-%d %H:%M"

# Short keyboard layout labels.
[modules.keyboard-input.layout-alias-map]
"English (US)" = "EN"
"Danish" = "DA"
"Spanish" = "ES"
"Spanish (Spain)" = "ES"

# Show workspace NUMBERS (display-mode = "label"). The workspace-map below sets
# only `color` per workspace — NOT `icon`: a map `icon` is "shown regardless"
# and would replace the number (that was the missing-numbers bug). `color` is
# the active-workspace background (active-indicator defaults to "background");
# the number itself is colored by the module's active/occupied/empty-color.
# Hyprland IDs are stable 1-10 so the map lands; niri IDs are dynamic (plain
# numbers, no map). label-size pinned in px to match the bar buttons.
[modules.hyprland-workspaces]
display-mode = "label"
label-size = "14px"

[modules.niri-workspaces]
label-size = "14px"

[modules.hyprland-workspaces.workspace-map]
1 = { color = "#89b4fa" }
2 = { color = "#f0c6c6" }
3 = { color = "#ddb6f2" }
4 = { color = "#f5bde6" }
5 = { color = "#f28d8c" }
6 = { color = "#e8a2a1" }
7 = { color = "#f8bd96" }
8 = { color = "#fae3b0" }
9 = { color = "#a6d189" }
10 = { color = "#81c8be" }

# --- Wallpaper (replaces hyprpaper + awww) ---------------------------------
# Same image on every monitor. config's [[wallpaper.monitors]] only does
# per-connector overrides (no wildcard), so the all-monitor wallpaper is
# applied at startup via `wayle wallpaper set <path>` (no --monitor = all
# monitors) — see src/_shared/scripts/wayle.launch.sh.
[wallpaper]
engine-enabled = true
# Animate wallpaper changes (and the startup set) with a bezier fade.
transition-type = "fade"
transition-duration = 1.0
transition-fps = 60

# --- OSD (new: waybar had no volume/brightness overlay) --------------------
[osd]
enabled = true
# Center the toast/toggle content (the keyboard-layout toast). Fork knob added
# in wayle-config osd schema; sliders keep their own label+value layout.
text-align = "center"

# Match the other modules' 20px icon content (centered in the 28px bar like the
# buttons' padded content). Pinned in px (was a 1.3 scale bump); internal-padding
# is horizontal-only on a top bar, so the tray contributes only its icon height.
[modules.systray]
icon-scale = "20px"

# Drop the "00" count label — the bell icon already conveys state
# (bell / bell-dot when unread / bell-off for DND).
[modules.notifications]
label-show = false

# Icon-only (the icon differs connected/disconnected); keeps the native
# dropdown. No "Disconnected" text — label-show is all-or-nothing, so a
# connected device name can't be shown without also showing it disconnected.
[modules.bluetooth]
label-show = false

# Scroll to adjust volume, middle-click to mute (left-click still opens the
# audio dropdown).
[modules.volume]
scroll-up = "wayle audio output-volume +5"
scroll-down = "wayle audio output-volume -5"
middle-click = "wayle audio output-mute"

# Mic: scroll to adjust input level, middle-click to mute.
[modules.microphone]
scroll-up = "wayle audio input-volume +5"
scroll-down = "wayle audio input-volume -5"
middle-click = "wayle audio input-mute"

# Brightness: scroll to adjust backlight (left-click still opens the dropdown).
# wayle has no brightness CLI (unlike audio), so scroll shells out to
# brightnessctl (declared in modules/home/wayle.nix). -n keeps a 1-unit floor so
# scrolling down never blacks the screen out completely.
[modules.brightness]
scroll-up = "brightnessctl set 5%+"
scroll-down = "brightnessctl set 5%- -n"

# Weather: powers the clock's right-click dropdown (no bar module). Coords are
# Copenhagen (kept in sync with hyprsunset.sun.sh); open-meteo needs no API key.
[modules.weather]
location = "55.6,12.5"
units = "metric"

# wayle's power module is a bare button with NO built-in menu (despite the
# docs) — every click action defaults to "" (no-op), which is why a click did
# nothing. Bind it to wleave, the GTK4 power menu installed + configured in
# modules/packages/wayland/tools.nix.
[modules.power]
left-click = "wleave"

# --- Custom modules --------------------------------------------------------
# All four status scripts emit waybar JSON ({text,tooltip,class}); wayle's
# custom module parses that natively, so they are reused unchanged. The
# scripts are on PATH as bins (see modules/home/scripts.nix).

# Submap indicator (icon-only). The hl Lua resize_mode isn't a native Hyprland
# submap, so hyprland.lua writes/removes a tmpfs marker on enter/exit and this
# watches it — shows only while in a submap (e.g. SUPER+R), hidden otherwise.
[[modules.custom]]
id = "submap"
mode = "watch"
restart-policy = "on-exit"
command = "wayle-widget submap-watch"
icon-name = "ld-layers-symbolic"
label-show = false
hide-if-empty = true

# Event-driven (watch): re-renders when the notmuch maildir changes — no poll.
[[modules.custom]]
id = "mail"
mode = "watch"
restart-policy = "on-exit"
command = "wayle-widget mail-watch"
icon-name = "ld-mail-symbolic"
left-click = "mail-open"
# Drops the widget at zero unread (wrapper emits an empty line) — no orphan
# icon or empty label slot; appears with a count only when mail arrives.
hide-if-empty = true

# Event-driven (watch): re-renders on each treeman daemon lifecycle event.
# icon-show = false: treeman's text is a compact per-bucket "{glyph} {count}"
# line (status.formats.icon in ~/.config/treeman/config.yaml), so the bucket
# glyphs carry the icon. Dropping icon-name alone still reserves a blank icon
# slot — icon-show = false removes it entirely.
[[modules.custom]]
id = "treeman"
mode = "watch"
restart-policy = "on-exit"
command = "wayle-widget treeman-watch"
icon-show = false
left-click = "treeman worktree list"
# treeman emits nothing when idle → collapse the slot entirely.
hide-if-empty = true

# Event-driven (watch): re-renders when the recorder pid markers change.
[[modules.custom]]
id = "screenrec"
mode = "watch"
restart-policy = "on-exit"
command = "wayle-widget screenrec-watch"
icon-name = "ld-disc-3-symbolic"
# Icon-only (always clickable to start a recording); idle/recording shown via
# color + tooltip, so no empty label slot.
label-show = false
left-click = "screen-record toggle"
middle-click = "screen-record toggle --cam"

# Blue-light filter. hyprsunset has no native lat/long mode, so the
# hyprsunset-sun service sets the daemon temperature on the real sunrise/sunset
# schedule and writes this widget's state line on every change. Event-driven
# (watch): re-renders on the scheduler's atomic state-file write — instant
# flips, no poll. Icon-only (no label): icon-map keys on `alt` — sun-moon while
# on the auto schedule, plain sun when manually disabled. left-click toggles the
# override (disable / hand back to auto) and signals the scheduler.
[[modules.custom]]
id = "hyprsunset"
mode = "watch"
restart-policy = "on-exit"
command = "wayle-widget hyprsunset-watch"
label-show = false
icon-name = "ld-sun-moon-symbolic"
icon-map = { auto = "ld-sun-moon-symbolic", off = "ld-sun-symbolic" }
class-format = "hyprsunset-{{ alt }}"
left-click = "wayle-widget hyprsunset-toggle"

# VPN: one tri-state icon-only module. The watcher emits `alt` = on/connecting/
# off; icon-map + color-map swap the icon AND its colors per state, replacing
# the old three hide-if-empty modules (icon-color was static per module before
# state colors existed). Old waybar look preserved: green lock connected,
# yellow-bg refresh connecting, grey unplug disconnected. Event-driven (watch):
# re-emits when the openconnect marker files / tunnel link change — no polling.
[[modules.custom]]
id = "vpn"
mode = "watch"
restart-policy = "on-exit"
command = "wayle-widget vpn-watch"
label-show = false
left-click = "vpn-konform-bar toggle"
icon-name = "ld-unplug-symbolic"
icon-map = { on = "ld-lock-symbolic", connecting = "ld-refresh-cw-symbolic", off = "ld-unplug-symbolic" }
color-map = { on = { icon-color = "green" }, connecting = { button-bg-color = "yellow", icon-color = "bg-base" }, off = { icon-color = "fg-muted" } }

# No built-in power-profiles module. One module: the watcher emits the active
# profile as `alt`; icon-map + color-map swap icon + color per state (replacing
# the old three hide-if-empty modules). Event-driven (watch) on the daemon's
# D-Bus ActiveProfile signal; click cycles. saver=green, balanced=blue,
# performance=red.
[[modules.custom]]
id = "powerprofile"
mode = "watch"
restart-policy = "on-exit"
command = "wayle-widget powerprofile-watch"
label-show = false
left-click = "power-profile-cycle"
icon-name = "ld-scale-symbolic"
icon-map = { power-saver = "ld-leaf-symbolic", balanced = "ld-scale-symbolic", performance = "ld-rocket-symbolic" }
color-map = { power-saver = { icon-color = "green" }, balanced = { icon-color = "blue" }, performance = { icon-color = "red" } }
tooltip-format = "Power profile: {{ alt }}"
