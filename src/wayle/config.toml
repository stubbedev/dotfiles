# wayle desktop shell config. Catppuccin Mocha; palette mirrors
# modules/home/xdg/hypr.nix:30-57 (manual sync). Full schema: wayle docs under
# docs/config/ in the upstream source, or https://wayle.app/config/.

[general]
# waybar rendered everything in JetBrainsMono Nerd Font; match that for both
# UI text and mono so the bar reads identically.
font-sans = "JetBrainsMono Nerd Font"
font-mono = "JetBrainsMono Nerd Font"

[styling]
# Static palette (no wallpaper-derived theming) so colors stay Catppuccin.
theme-provider = "wayle"
# Rounded dropdowns/popovers/OSD/dialogs (the bar itself stays flat — see
# [bar].rounding/button-rounding = "none").
rounding = "sm"

[styling.palette]
# bg=base, surface=mantle (the waybar bar color), elevated=surface0 (pills).
bg = "#1e1e2e"
surface = "#181825"
elevated = "#313244"
fg = "#cdd6f4"
fg-muted = "#a6adc8"
primary = "#cba6f7"
red = "#f38ba8"
yellow = "#f9e2af"
green = "#a6e3a1"
blue = "#89b4fa"

[bar]
location = "top"
exclusive = true
# Flat bar — no border radius anywhere (bar, buttons, button groups).
rounding = "none"
button-rounding = "none"
button-group-rounding = "none"
# "basic" = icon+label, minimal background (no colored pill per module).
button-variant = "basic"
# Compact: shrink bar elements + tighten spacing. No exact-height knob in
# wayle 0.6 — height is emergent from scale + padding + icon/label size.
scale = 0.75
# Bigger label/icon content (equal sizes so they align vertically), padding
# kept modest to balance height vs vertical centering.
button-label-size = 1.15
button-icon-size = 1.15
padding = 0.15
module-gap = 0.35
button-border-location = "none"

[[bar.layout]]
monitor = "*"
left = ["hyprland-workspaces", "niri-workspaces", "keybind-mode"]
# Clock centered as the focal point; everything else on the right.
center = ["clock"]
# Grouped left-to-right by purpose: activity → audio/hardware → connectivity →
# system → tray → vpn → notifications → power.
right = [
  "custom-mail",
  "custom-treeman",
  "keyboard-input",
  "custom-screenrec",
  "volume",
  "microphone",
  "brightness",
  @BATTERY@
  "network",
  "bluetooth",
  "hyprsunset",
  "idle-inhibit",
  "custom-pp-saver",
  "custom-pp-balanced",
  "custom-pp-performance",
  "systray",
  "custom-vpn-on",
  "custom-vpn-connecting",
  "custom-vpn-off",
  "notifications",
  "power",
]

[modules.clock]
# waybar showed an ISO-ish date + 24h time.
format = "%Y-%m-%d %H:%M"

# Submap indicator (SUPER+R "resize_mode"). auto-hide: hidden at rest (submap
# resets to empty); icon-only (no label) while a submap is active.
[modules.keybind-mode]
auto-hide = true
label-show = false

# Short keyboard layout labels.
[modules.keyboard-input.layout-alias-map]
"English (US)" = "EN"
"Danish" = "DA"
"Spanish" = "ES"
"Spanish (Spain)" = "ES"

# Numbers, with the old waybar per-workspace colors via the map (color applies
# to the label). Hyprland workspace IDs are stable 1-10 so the map lands; niri
# IDs are dynamic so its module just shows plain numbers.
[modules.hyprland-workspaces]
display-mode = "label"

[modules.hyprland-workspaces.workspace-map]
1 = { icon = "tbf-circle-symbolic", color = "#89b4fa" }
2 = { icon = "tbf-circle-symbolic", color = "#f0c6c6" }
3 = { icon = "tbf-circle-symbolic", color = "#ddb6f2" }
4 = { icon = "tbf-circle-symbolic", color = "#f5bde6" }
5 = { icon = "tbf-circle-symbolic", color = "#f28d8c" }
6 = { icon = "tbf-circle-symbolic", color = "#e8a2a1" }
7 = { icon = "tbf-circle-symbolic", color = "#f8bd96" }
8 = { icon = "tbf-circle-symbolic", color = "#fae3b0" }
9 = { icon = "tbf-circle-symbolic", color = "#a6d189" }
10 = { icon = "tbf-circle-symbolic", color = "#81c8be" }

# --- Wallpaper (replaces hyprpaper + awww) ---------------------------------
# Same image on every monitor. config's [[wallpaper.monitors]] only does
# per-connector overrides (no wildcard), so the all-monitor wallpaper is
# applied at startup via `wayle wallpaper set <path>` (no --monitor = all
# monitors) — see src/_shared/scripts/wayle.launch.sh.
[wallpaper]
engine-enabled = true
# Animate wallpaper changes (and the startup set) with a bezier fade.
transition-type = "fade"
transition-duration = 1.0
transition-fps = 60

# --- OSD (new: waybar had no volume/brightness overlay) --------------------
[osd]
enabled = true

# Drop the "00" count label — the bell icon already conveys state
# (bell / bell-dot when unread / bell-off for DND).
[modules.notifications]
label-show = false

# Icon-only (the icon differs connected/disconnected); keeps the native
# dropdown. No "Disconnected" text — label-show is all-or-nothing, so a
# connected device name can't be shown without also showing it disconnected.
[modules.bluetooth]
label-show = false

# Scroll to adjust volume, middle-click to mute (left-click still opens the
# audio dropdown).
[modules.volume]
scroll-up = "wayle audio output-volume +5"
scroll-down = "wayle audio output-volume -5"
middle-click = "wayle audio output-mute"

# Mic: scroll to adjust input level, middle-click to mute.
[modules.microphone]
scroll-up = "wayle audio input-volume +5"
scroll-down = "wayle audio input-volume -5"
middle-click = "wayle audio input-mute"

# Weather: powers the clock's right-click dropdown (no bar module). Coords are
# Copenhagen (from src/hypr/hyprsunset.conf); open-meteo needs no API key.
[modules.weather]
location = "55.6,12.5"
units = "metric"

# Blue-light filter toggle (drives the hyprsunset daemon); warm 4500K when on.
[modules.hyprsunset]
temperature = 4500

# --- Custom modules --------------------------------------------------------
# All four status scripts emit waybar JSON ({text,tooltip,class}); wayle's
# custom module parses that natively, so they are reused unchanged. The
# scripts are on PATH as bins (see modules/home/scripts.nix).

# Event-driven (watch): re-renders when the notmuch maildir changes — no poll.
[[modules.custom]]
id = "mail"
mode = "watch"
restart-policy = "on-exit"
command = "wayle-widget mail-watch"
icon-name = "ld-mail-symbolic"
left-click = "mail-open"
# Drops the widget at zero unread (wrapper emits an empty line) — no orphan
# icon or empty label slot; appears with a count only when mail arrives.
hide-if-empty = true

# Event-driven (watch): re-renders on each treeman daemon lifecycle event.
[[modules.custom]]
id = "treeman"
mode = "watch"
restart-policy = "on-exit"
command = "wayle-widget treeman-watch"
icon-name = "ld-folder-open-symbolic"
left-click = "treeman worktree list"
# treeman emits nothing when idle → collapse the slot entirely.
hide-if-empty = true

# Event-driven (watch): re-renders when the recorder pid markers change.
[[modules.custom]]
id = "screenrec"
mode = "watch"
restart-policy = "on-exit"
command = "wayle-widget screenrec-watch"
icon-name = "ld-disc-3-symbolic"
# Icon-only (always clickable to start a recording); idle/recording shown via
# color + tooltip, so no empty label slot.
label-show = false
left-click = "screen-record toggle"
middle-click = "screen-record toggle --cam"

# VPN: three icon-only, color-coded modules — exactly one shows at a time
# (hide-if-empty). icon-color/button-bg-color are static per module, so the
# 3-state look (the old waybar: grey disconnected, yellow-bg connecting,
# green connected) needs the split. on-action re-renders instantly on toggle.
# Event-driven (watch mode): each watcher re-emits when the openconnect marker
# files change — no polling. restart-policy revives the watch if inotifywait
# dies. on-action gives instant click feedback.
[[modules.custom]]
id = "vpn-on"
mode = "watch"
restart-policy = "on-exit"
command = "wayle-widget vpn-watch on"
icon-name = "ld-lock-symbolic"
icon-color = "green"
label-show = false
hide-if-empty = true
left-click = "vpn-konform-bar toggle"

[[modules.custom]]
id = "vpn-connecting"
mode = "watch"
restart-policy = "on-exit"
command = "wayle-widget vpn-watch connecting"
icon-name = "ld-refresh-cw-symbolic"
button-bg-color = "yellow"
icon-color = "bg-base"
label-show = false
hide-if-empty = true
left-click = "vpn-konform-bar toggle"

[[modules.custom]]
id = "vpn-off"
mode = "watch"
restart-policy = "on-exit"
command = "wayle-widget vpn-watch off"
icon-name = "ld-unplug-symbolic"
icon-color = "fg-muted"
label-show = false
hide-if-empty = true
left-click = "vpn-konform-bar toggle"

# No built-in power-profiles module. Three icon-only, color-coded modules —
# exactly one shows at a time (hide-if-empty), since icon-color is static per
# module. Event-driven (watch) on the daemon's D-Bus ActiveProfile signal;
# click any to cycle. power-saver=green, balanced=blue, performance=red.
[[modules.custom]]
id = "pp-saver"
mode = "watch"
restart-policy = "on-exit"
command = "wayle-widget powerprofile-watch power-saver"
label-show = false
hide-if-empty = true
icon-name = "ld-leaf-symbolic"
icon-color = "green"
tooltip-format = "Power profile: power-saver"
left-click = "power-profile-cycle"

[[modules.custom]]
id = "pp-balanced"
mode = "watch"
restart-policy = "on-exit"
command = "wayle-widget powerprofile-watch balanced"
label-show = false
hide-if-empty = true
icon-name = "ld-scale-symbolic"
icon-color = "blue"
tooltip-format = "Power profile: balanced"
left-click = "power-profile-cycle"

[[modules.custom]]
id = "pp-performance"
mode = "watch"
restart-policy = "on-exit"
command = "wayle-widget powerprofile-watch performance"
label-show = false
hide-if-empty = true
icon-name = "ld-rocket-symbolic"
icon-color = "red"
tooltip-format = "Power profile: performance"
left-click = "power-profile-cycle"
