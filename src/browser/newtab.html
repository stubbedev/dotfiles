<!DOCTYPE html>
<!--
  Minimal local new-tab / new-window page.
  Read and interpolated by Nix via homeLib.substituteFile —
  see modules/packages/browser-newtab.nix. @BG@/@FG@/@MUTED@ are
  filled in with the Catppuccin Mocha palette at build time.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>New Tab</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      height: 100%;
      background: @BG@;
      color: @FG@;
      font-family: ui-monospace, "JetBrains Mono", "SFMono-Regular", monospace;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
    }
    #time { font-size: 5rem; font-weight: 600; letter-spacing: 0.04em; }
    #date { font-size: 1.2rem; color: @MUTED@; }
  </style>
</head>
<body>
  <div id="time">--:--</div>
  <div id="date"></div>
  <script>
    const pad = (n) => String(n).padStart(2, "0");

    class Clock {
      // Private fields — `this` resolves to the instance inside methods
      // because they are real methods called as `clock.tick()`.
      #timeEl = document.getElementById("time");
      #dateEl = document.getElementById("date");
      #lastTime = "";
      #lastDate = "";

      tick() {
        const now = new Date();

        const time = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
        if (time !== this.#lastTime) {
          this.#lastTime = time;
          this.#timeEl.textContent = time;
        }

        const date = now.toLocaleDateString(undefined, {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric",
        });
        if (date !== this.#lastDate) {
          this.#lastDate = date;
          this.#dateEl.textContent = date;
        }
      }
    }

    const clock = new Clock();
    clock.tick();
    // Arrow wrapper keeps the call form `clock.tick()`, so `this` stays
    // the instance — `setInterval(clock.tick, …)` would detach it.
    setInterval(() => clock.tick(), 1000);
  </script>
</body>
</html>
