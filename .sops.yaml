# Per-machine age recipients. Each entry is the age pubkey derived from
# the machine's SSH ed25519 pubkey. To add a new machine:
#   1. On the new machine:        hm whoami            (or: ssh-to-age < ~/.ssh/id_ed25519.pub)
#   2. On any existing machine:   hm trust <name> <pubkey>
#   3. Commit and push so the new machine can pull and decrypt.
creation_rules:
  # Every file under secrets/ is one opaque blob, encrypted in binary mode.
  - path_regex: secrets/[^/]+$
    key_groups:
      - age:
          - age1ph82fy2jgjsmcsaufsrlzsql65g0ca954elacmqlsesz9ladwd0sgxsxj8  # stubbe (user ~/.ssh/id_ed25519)
          # Host key (/etc/ssh/ssh_host_ed25519_key). NixOS sops-nix decrypts
          # system secrets (e.g. github-token) with this at boot — see
          # modules/nixos/sops.nix. Without it those activations fail with
          # "0 successful groups required, got 0".
          - age1grkukkq0j3sgj84suvxftywmlgltrncp577ekgua9yv3cfrrfvrq7rycsh  # stubbe-nixos (host)
