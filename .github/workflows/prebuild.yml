name: prebuild

# Nightly prebuild of THIS flake's toplevel closures, pushed to the
# `default` cache on nix.stubbe.dev (xilo). This is what lets a laptop `hm switch`
# substitute the heavy first-party builds (phpantom_lsp, hyprland, wayle,
# rust nightly, …) instead of compiling them locally.
#
# Workflow model (see bin/hm): CI owns the flake.lock bumps. It runs
# `nix flake update`, builds the closures, pushes them, then commits the
# updated lock back to master. A machine then runs `hm switch` (NOT
# `hm upgrade` — no need to bump the lock locally); sync_flake_repo pulls
# this commit and everything substitutes from the cache.
#
# SECURITY — never push secrets. The only flake output that bakes
# unencrypted private keys into the store is the installer ISO
# (modules/installer/iso.nix, impure ~/.ssh read). This job builds ONLY
# the two named toplevel attrs below — never `installer-iso`, never a
# `.#` wildcard — so no private key can ever transit the cache. The
# normal toplevels carry only ENCRYPTED sops ciphertext, which is already
# public in this (public) repo.

on:
  schedule:
    # 04:00 UTC daily. Catches input drift (nixpkgs-unstable, fenix nightly).
    - cron: "0 4 * * *"
  workflow_dispatch:

# Push the regenerated flake.lock back to master.
permissions:
  contents: write

# One prebuild at a time: a scheduled run and a manual dispatch must not
# race on the flake.lock commit.
concurrency:
  group: prebuild
  cancel-in-progress: false

jobs:
  prebuild:
    name: build + push toplevels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # A cache-miss night (nixpkgs/fenix bump) compiles the full NixOS
      # toplevel from source, which overflows the ~14GB free on a hosted
      # runner. A full store partition reads back as "runner lost
      # communication", so reclaim the preinstalled toolchains we never use
      # (~30GB: dotnet, android, ghc, CodeQL) before building.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL \
            /usr/share/swift /usr/local/share/powershell || true
          sudo docker image prune --all --force || true
          df -h /

      # The runner froze mid-build once disk was no longer the limit: several
      # heavy source builds (hyprland, wayle, rust nightly) linking at once
      # exhaust the 16GB RAM, thrash, and the runner gets SIGTERM'd (exit
      # 143). max-jobs=1 below serialises the heavy builds; this 14G swapfile
      # is the cushion for a single build's peak so a spike spills to disk
      # instead of OOM-killing the runner.
      - name: Add swap
        run: |
          sudo fallocate -l 14G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      - uses: DeterminateSystems/nix-installer-action@v22
        with:
          # Trust + pull from the same caches the flake declares
          # (lib/nix-cache.nix), so the runner substitutes already-built
          # paths — including the `default` cache from prior runs — and
          # only compiles the deltas. fenix's rust toolchain comes from
          # nix-community; cache.nixos.org is on by default.
          #
          # min-free/max-free: when the store drops below 3GB free, nix GCs
          # unused paths mid-build up to 6GB — a second guard against the
          # disk-exhaustion "lost communication" death on cache-miss nights.
          extra-conf: |
            extra-substituters = https://nix.stubbe.dev/default https://nix.stubbe.dev/wayle https://nix.stubbe.dev/treeman https://nix.stubbe.dev/srv https://nix-community.cachix.org
            extra-trusted-public-keys = default:6uWvXutL9cXjV3lii+Ur5ff+ArQoG4kMBKNXWrIxhHg= wayle:BA9vQHJFl0dx4Zl5y0tbk+Osfly7y6k6tPKWAy49rdQ= treeman:nOhvFetrH3t/RtM5sPG1fYuX4dFjhbzrttIOVGJpPDI= srv:FfS/3wZKXdWv2JB+w2d5rlwRhKOYEyxFROsQGIs6etk= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=
            min-free = 3221225472
            max-free = 6442450944

      - name: Update flake inputs
        run: nix flake update

      - name: Build toplevels
        id: build
        # --impure: graphics.nix reads /proc for GPU detection (same as the
        #   eval checks); the runner has no NVIDIA driver so it resolves the
        #   non-NVIDIA path. HOME has no ~/.ssh keys here, so even an
        #   accidental impure read would be empty — but the ISO attr is
        #   never referenced regardless.
        # ONLY these two attrs. Do not add installer-iso (bakes private keys).
        #
        # --max-jobs 1: build one derivation at a time so two heavy source
        #   builds never contend for RAM (the OOM-freeze fix). Tiny drvs are
        #   instant, so this only slows the rare cache-miss night — and makes
        #   it finish instead of hang. There is no job timeout (6h default),
        #   so slower-but-completes is the right trade.
        # --max-silent-time 1800: kill any build silent for 30min and print
        #   which derivation it was, so a genuine hang fails fast and named
        #   instead of freezing blind for an hour.
        run: |
          set -euo pipefail
          out=$(nix build --impure --no-link --print-out-paths \
            --max-jobs 1 --max-silent-time 1800 \
            '.#homeConfigurations.stubbe.activationPackage' \
            '.#nixosConfigurations.stubbe-nixos.config.system.build.toplevel')
          echo "Built:"
          echo "$out"
          # Newline -> space for the push arg list.
          echo "paths=$(echo $out | tr '\n' ' ')" >> "$GITHUB_OUTPUT"

      - name: setup xilo
        uses: stubbedev/xilo@v0
        with:
          url: https://nix.stubbe.dev
          cache: default
          token: ${{ secrets.XILO_TOKEN }}
          # Pin the client: the action defaults to the latest xilo binary,
          # and v1.0.0 (2026-07-12) changed the cache-config endpoint, so
          # `xilo use` 404s against the v0-API server on nix.stubbe.dev.
          # Bump this once the server is upgraded to the v1 protocol.
          version: v0.2.5

      - name: Push closures to the default cache
        run: |
          set -euo pipefail
          # xilo push uploads each path's full closure, skipping paths and
          # chunks the server already has and anything signed by
          # cache.nixos.org — push is idempotent, so retry transient failures.
          # ponytail: 3 tries w/ backoff; make it a real queue if it persists.
          for attempt in 1 2 3; do
            if xilo push default ${{ steps.build.outputs.paths }}; then
              exit 0
            fi
            echo "xilo push failed (attempt $attempt); retrying in $((attempt * 15))s…"
            sleep $((attempt * 15))
          done
          echo "xilo push still failing after 3 attempts" >&2
          exit 1

      - name: Commit updated flake.lock
        run: |
          set -euo pipefail
          if git diff --quiet -- flake.lock; then
            echo "flake.lock unchanged — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # This job runs ~1h. Another commit (e.g. a manual push) can land on
          # master mid-run, so a plain push loses the fast-forward race. Only
          # flake.lock changes here, so on rejection: stash the regenerated
          # lock, reset to the moved remote tip, restore it, recommit, retry.
          for attempt in 1 2 3 4 5; do
            git add flake.lock
            git commit -m "chore: update flake.lock (prebuild)" || true
            if git push; then exit 0; fi
            echo "push rejected; syncing to latest master (attempt $attempt)…"
            cp flake.lock "$RUNNER_TEMP/flake.lock.prebuild"
            git fetch origin master
            git reset --hard origin/master
            cp "$RUNNER_TEMP/flake.lock.prebuild" flake.lock
            if git diff --quiet -- flake.lock; then
              echo "remote already has this flake.lock — nothing to push."
              exit 0
            fi
            sleep $((attempt * 3))
          done
          echo "flake.lock push still failing after 5 attempts" >&2
          exit 1
